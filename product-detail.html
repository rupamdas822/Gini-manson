<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Product Details | JOY GINI MANSON'S</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            background: #f5f5f5;
            padding: 20px;
            min-height: 100vh;
        }

        /* Store Header */
        .store-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .store-name {
            font-size: 1.8rem;
            font-weight: 700;
            color: #8B3C1C;
            letter-spacing: 1px;
        }
        .store-tagline {
            color: #666;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin: 15px 0 0 20px;
            color: #007185;
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover { color: #C7511F; text-decoration: underline; }

        /* Product Detail Section - Amazon Style */
        .product-detail {
            display: flex;
            flex-wrap: wrap;
            padding: 20px;
            gap: 30px;
        }

        .product-image {
            flex: 1;
            min-width: 280px;
            text-align: center;
            background: #fff;
            padding: 20px;
        }
        .product-image img {
            max-width: 100%;
            max-height: 400px;
            object-fit: contain;
        }

        .product-info {
            flex: 1;
            min-width: 280px;
        }

        .product-category {
            color: #007185;
            font-size: 13px;
            margin-bottom: 8px;
        }

        .product-title {
            font-size: 1.6rem;
            font-weight: 400;
            color: #0F1111;
            margin-bottom: 10px;
            line-height: 1.3;
        }

        /* Amazon Style Rating Section */
        .rating-section {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            padding: 8px 0;
            border-bottom: 1px solid #e7e7e7;
            margin-bottom: 12px;
        }
        .stars-display {
            color: #FFA41C;
            font-size: 1rem;
            letter-spacing: 2px;
        }
        .rating-link {
            color: #007185;
            font-size: 13px;
            text-decoration: none;
        }
        .rating-link:hover {
            color: #C7511F;
            text-decoration: underline;
        }
        .review-count-text {
            color: #565959;
            font-size: 13px;
        }

        .product-price {
            font-size: 1.8rem;
            color: #B12704;
            font-weight: 500;
            margin: 12px 0;
        }

        .product-stock {
            margin: 12px 0;
            font-size: 14px;
        }
        .in-stock { color: #007600; font-weight: 500; }
        .out-stock { color: #C7511F; font-weight: 500; }

        .description {
            margin: 15px 0;
            color: #0F1111;
            font-size: 14px;
            line-height: 1.6;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .btn {
            background: #FFD814;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-buy {
            background: #FFA41C;
            color: #0F1111;
        }
        .btn-buy:hover {
            background: #F3A847;
        }
        .share-btn {
            background: #25D366;
            color: white;
        }
        .share-btn:hover {
            background: #128C7E;
        }

        /* Flipkart/Amazon Style Reviews Section */
        .reviews-section {
            padding: 20px 25px;
            background: #fff;
            border-top: 1px solid #e7e7e7;
        }
        .reviews-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e7e7e7;
        }
        .reviews-header h3 {
            font-size: 1.2rem;
            font-weight: 600;
            color: #0F1111;
        }
        .write-review-btn {
            background: transparent;
            border: 1px solid #D5D9D9;
            border-radius: 8px;
            padding: 8px 16px;
            cursor: pointer;
            font-size: 13px;
            color: #007185;
            transition: 0.2s;
        }
        .write-review-btn:hover {
            background: #f0f2f2;
            border-color: #007185;
        }

        /* Rating Breakdown Bar - Flipkart Style */
        .rating-breakdown {
            background: #f7f7f7;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }
        .rating-breakdown-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 12px;
            color: #0F1111;
        }
        .rating-bar-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 12px;
        }
        .rating-bar-label {
            width: 40px;
            color: #007185;
        }
        .rating-bar-bg {
            flex: 1;
            height: 8px;
            background: #e0e0e0;
            border-radius: 4px;
            overflow: hidden;
        }
        .rating-bar-fill {
            height: 100%;
            background: #FFA41C;
            border-radius: 4px;
        }
        .rating-bar-percent {
            width: 40px;
            color: #565959;
        }

        /* Review Card - Amazon/Flipkart Style */
        .review-card {
            border-bottom: 1px solid #e7e7e7;
            padding: 18px 0;
        }
        .review-card:last-child {
            border-bottom: none;
        }
        .reviewer-name {
            font-weight: 600;
            color: #0F1111;
            font-size: 14px;
        }
        .review-stars {
            color: #FFA41C;
            font-size: 12px;
            margin: 6px 0;
        }
        .review-title {
            font-weight: 600;
            font-size: 14px;
            margin: 6px 0;
            color: #0F1111;
        }
        .review-date {
            font-size: 11px;
            color: #565959;
            float: right;
        }
        .review-comment {
            font-size: 13px;
            color: #0F1111;
            line-height: 1.5;
            margin-top: 8px;
        }
        .review-helpful {
            margin-top: 10px;
            font-size: 11px;
            color: #007185;
        }
        .review-helpful span {
            cursor: pointer;
            margin-right: 15px;
        }
        .review-helpful span:hover {
            text-decoration: underline;
        }

        .no-reviews {
            text-align: center;
            padding: 40px;
            color: #565959;
        }
        .avg-rating-large {
            text-align: center;
            padding: 15px;
            background: #f7f7f7;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .avg-rating-number {
            font-size: 2.5rem;
            font-weight: 600;
            color: #0F1111;
        }
        .avg-rating-stars {
            color: #FFA41C;
            font-size: 1rem;
            margin: 5px 0;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .modal.active { display: flex; }
        .modal-content {
            background: white;
            border-radius: 8px;
            padding: 25px;
            max-width: 500px;
            width: 90%;
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }
        .modal-close:hover { color: #000; }
        
        .modal-content input, .modal-content textarea, .modal-content select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
        }
        .modal-content label {
            font-weight: 500;
            margin-top: 10px;
            display: block;
        }
        
        .star-rating-widget {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin: 10px 0;
        }
        .star-rating-widget .star {
            font-size: 28px;
            cursor: pointer;
            color: #ddd;
            transition: 0.1s;
        }
        .star-rating-widget .star.selected { color: #FFA41C; }
        .star-rating-widget .star:hover { transform: scale(1.1); color: #FFA41C; }
        
        .alert {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #007600;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            z-index: 2100;
        }
        .alert-error { background: #C7511F; }
        
        @media (max-width: 768px) {
            .product-detail { padding: 15px; gap: 15px; }
            .product-title { font-size: 1.3rem; }
            .rating-breakdown { padding: 10px; }
        }
    </style>
</head>
<body>
    <div class="store-header">
        <div class="store-name">JOY GINI MANSON'S</div>
        <div class="store-tagline">PREMIUM BEAUTY & COSMETICS</div>
    </div>
    <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to products</a>
    <div class="container">
        <div id="productContainer" class="product-detail">Loading...</div>
        <div id="reviewsContainer" class="reviews-section">
            <!-- Reviews will be injected here -->
        </div>
    </div>

    <!-- Order Modal -->
    <div id="orderModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="modalClose">&times;</span>
            <h3 style="margin-bottom:15px;">Place Your Order</h3>
            <form id="orderForm">
                <input type="hidden" id="productId">
                <input type="hidden" id="productPrice">
                <label>Full Name *</label>
                <input type="text" id="customerName" required>
                <label>Phone Number *</label>
                <input type="tel" id="customerPhone" required>
                <label>Delivery Address *</label>
                <textarea id="customerAddress" rows="2" required></textarea>
                <label>Quantity *</label>
                <input type="number" id="quantity" value="1" min="1" required>
                <label>Special Instructions</label>
                <textarea id="specialInstructions" rows="2"></textarea>
                <button type="submit" style="width:100%; background:#FFA41C; border:none; padding:12px; border-radius:20px; margin-top:10px; cursor:pointer; font-weight:600;">Place Order</button>
            </form>
        </div>
    </div>

    <!-- Write Review Modal -->
    <div id="reviewModal" class="modal">
        <div class="modal-content">
            <span class="modal-close" id="reviewModalClose">&times;</span>
            <h3 style="margin-bottom:15px;">Write a Product Review</h3>
            <input type="hidden" id="reviewProductId">
            <label>Your Name *</label>
            <input type="text" id="reviewerName" placeholder="Example: Riya Sharma" required>
            <label>Your Rating *</label>
            <div class="star-rating-widget" id="starRatingWidget">
                <span class="star" data-value="1">★</span>
                <span class="star" data-value="2">★</span>
                <span class="star" data-value="3">★</span>
                <span class="star" data-value="4">★</span>
                <span class="star" data-value="5">★</span>
            </div>
            <input type="hidden" id="ratingValue" value="0">
            <label>Review Title (Optional)</label>
            <input type="text" id="reviewTitle" placeholder="e.g., Great product!">
            <label>Your Review *</label>
            <textarea id="reviewComment" rows="3" placeholder="Share your experience with this product..." required></textarea>
            <button id="submitReviewBtn" style="width:100%; background:#FFD814; border:none; padding:12px; border-radius:20px; margin-top:10px; cursor:pointer; font-weight:600;">Submit Review</button>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://sbnkxplyjifishrocjge.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNibmt4cGx5amlmaXNocm9jamdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDA5OTUsImV4cCI6MjA5MjM3Njk5NX0.dVASIJbH19EIEy6oenyjwKb2sJVjQ3YPZir6iNZCKGk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const urlParams = new URLSearchParams(window.location.search);
            const productId = urlParams.get('id');

            function escapeHtml(str) {
                if (!str) return '';
                return str.replace(/[&<>]/g, function(m) {
                    if (m === '&') return '&amp;';
                    if (m === '<') return '&lt;';
                    if (m === '>') return '&gt;';
                    return m;
                });
            }

            function generateStarHtml(rating) {
                let full = Math.floor(rating);
                let half = (rating % 1) >= 0.5;
                let empty = 5 - full - (half ? 1 : 0);
                let stars = '';
                for(let i=0; i<full; i++) stars += '<i class="fas fa-star"></i>';
                if(half) stars += '<i class="fas fa-star-half-alt"></i>';
                for(let i=0; i<empty; i++) stars += '<i class="far fa-star"></i>';
                return stars;
            }

            function generateSmallStars(rating) {
                let full = Math.round(rating);
                let stars = '';
                for(let i=0; i<full; i++) stars += '★';
                for(let i=full; i<5; i++) stars += '☆';
                return stars;
            }

            // Calculate rating breakdown
            function getRatingBreakdown(reviews) {
                const breakdown = { 5:0, 4:0, 3:0, 2:0, 1:0 };
                reviews.forEach(r => {
                    if (r.rating >= 1 && r.rating <= 5) breakdown[r.rating]++;
                });
                const total = reviews.length;
                return { breakdown, total };
            }

            async function loadAndDisplayReviews(product_id) {
                const { data: reviews, error } = await supabase
                    .from('product_reviews')
                    .select('*')
                    .eq('product_id', product_id)
                    .order('created_at', { ascending: false });
                
                if (error && error.code !== '42P01') console.warn(error);
                const safeReviews = reviews || [];
                
                let avgRating = 0;
                if (safeReviews.length > 0) {
                    const sum = safeReviews.reduce((acc, r) => acc + (r.rating || 0), 0);
                    avgRating = sum / safeReviews.length;
                }
                
                // Update rating preview in product info
                const ratingPreviewDiv = document.getElementById('productRatingPreview');
                if (ratingPreviewDiv) {
                    ratingPreviewDiv.innerHTML = `
                        <div class="stars-display">${generateStarHtml(avgRating)}</div>
                        <a href="#reviews" class="rating-link">${avgRating.toFixed(1)} out of 5</a>
                        <span class="review-count-text">${safeReviews.length} global ratings</span>
                    `;
                }
                
                const reviewsContainer = document.getElementById('reviewsContainer');
                if (!reviewsContainer) return;
                
                const { breakdown, total } = getRatingBreakdown(safeReviews);
                
                // Build rating breakdown HTML
                let breakdownHtml = '';
                if (safeReviews.length > 0) {
                    breakdownHtml = `
                        <div class="rating-breakdown">
                            <div class="rating-breakdown-title">Rating Breakdown</div>
                            ${[5,4,3,2,1].map(star => {
                                const count = breakdown[star] || 0;
                                const percent = total > 0 ? (count / total) * 100 : 0;
                                return `
                                    <div class="rating-bar-item">
                                        <div class="rating-bar-label">${star} ★</div>
                                        <div class="rating-bar-bg"><div class="rating-bar-fill" style="width: ${percent}%;"></div></div>
                                        <div class="rating-bar-percent">${Math.round(percent)}%</div>
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    `;
                }
                
                // Build reviews list
                let reviewsHtml = '';
                if (safeReviews.length === 0) {
                    reviewsHtml = `<div class="no-reviews">No reviews yet. Be the first to review this product!</div>`;
                } else {
                    reviewsHtml = safeReviews.map(rev => {
                        const date = new Date(rev.created_at).toLocaleDateString('en-IN', { year: 'numeric', month: 'long', day: 'numeric' });
                        const title = rev.review_title || '';
                        return `
                            <div class="review-card">
                                <div class="review-date">Reviewed in India on ${date}</div>
                                <div class="reviewer-name">${escapeHtml(rev.reviewer_name)}</div>
                                <div class="review-stars">${generateSmallStars(rev.rating)}</div>
                                ${title ? `<div class="review-title">${escapeHtml(title)}</div>` : ''}
                                <div class="review-comment">${escapeHtml(rev.comment)}</div>
                                <div class="review-helpful">
                                    <span>Was this review helpful?</span>
                                    <span>👍 Yes</span>
                                    <span>👎 No</span>
                                    <span>Report</span>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
                
                // Overall rating card
                const avgCardHtml = safeReviews.length > 0 ? `
                    <div class="avg-rating-large">
                        <div class="avg-rating-number">${avgRating.toFixed(1)}</div>
                        <div class="avg-rating-stars">${generateStarHtml(avgRating)}</div>
                        <div style="font-size:12px; color:#565959;">${safeReviews.length} ratings</div>
                    </div>
                ` : '';
                
                reviewsContainer.innerHTML = `
                    <div class="reviews-header">
                        <h3>Customer Reviews</h3>
                        <button class="write-review-btn" id="openReviewModalBtn">Write a review</button>
                    </div>
                    ${avgCardHtml}
                    <div style="display: flex; flex-wrap: wrap; gap: 30px;">
                        <div style="flex: 1; min-width: 200px;">${breakdownHtml}</div>
                        <div style="flex: 2;">${reviewsHtml}</div>
                    </div>
                `;
                
                const writeBtn = document.getElementById('openReviewModalBtn');
                if (writeBtn) writeBtn.onclick = () => openWriteReviewModal(product_id);
            }
            
            // Star rating setup for modal
            function setupStarRating() {
                const stars = document.querySelectorAll('#starRatingWidget .star');
                const ratingInput = document.getElementById('ratingValue');
                stars.forEach(star => {
                    const newStar = star.cloneNode(true);
                    star.parentNode.replaceChild(newStar, star);
                    
                    newStar.addEventListener('click', function() {
                        const value = parseInt(this.dataset.value);
                        ratingInput.value = value;
                        stars.forEach(s => {
                            if (parseInt(s.dataset.value) <= value) s.classList.add('selected');
                            else s.classList.remove('selected');
                        });
                    });
                    
                    newStar.addEventListener('mouseenter', function() {
                        const value = parseInt(this.dataset.value);
                        stars.forEach(s => {
                            if (parseInt(s.dataset.value) <= value) s.style.color = '#FFA41C';
                            else s.style.color = '#ddd';
                        });
                    });
                    
                    newStar.addEventListener('mouseleave', function() {
                        const current = parseInt(ratingInput.value) || 0;
                        stars.forEach(s => {
                            if (current > 0 && parseInt(s.dataset.value) <= current) s.style.color = '#FFA41C';
                            else s.style.color = '#ddd';
                        });
                    });
                });
            }
            
            function openWriteReviewModal(prodId) {
                document.getElementById('reviewProductId').value = prodId;
                document.getElementById('reviewerName').value = '';
                document.getElementById('reviewTitle').value = '';
                document.getElementById('reviewComment').value = '';
                document.getElementById('ratingValue').value = 0;
                const stars = document.querySelectorAll('#starRatingWidget .star');
                stars.forEach(s => s.classList.remove('selected'));
                document.getElementById('reviewModal').classList.add('active');
                setTimeout(() => setupStarRating(), 50);
            }
            
            async function submitReview() {
                const product_id = document.getElementById('reviewProductId').value;
                const reviewer_name = document.getElementById('reviewerName').value.trim();
                const title = document.getElementById('reviewTitle').value.trim();
                const comment = document.getElementById('reviewComment').value.trim();
                const rating = parseInt(document.getElementById('ratingValue').value);
                
                if(!reviewer_name) { alert('Please enter your name'); return; }
                if(!comment) { alert('Please write your review'); return; }
                if(rating < 1) { alert('Please select a rating'); return; }
                
                const { error } = await supabase.from('product_reviews').insert([{
                    product_id: parseInt(product_id),
                    reviewer_name: reviewer_name,
                    rating: rating,
                    review_title: title || null,
                    comment: comment,
                    created_at: new Date().toISOString()
                }]);
                
                if(error) {
                    console.error(error);
                    alert('Failed to submit: ' + error.message);
                } else {
                    alert('Thank you for your review!');
                    document.getElementById('reviewModal').classList.remove('active');
                    loadAndDisplayReviews(parseInt(product_id));
                }
            }
            
            async function loadProduct() {
                const container = document.getElementById('productContainer');
                if (!productId) {
                    container.innerHTML = '<div style="padding:60px;text-align:center;">No product selected.</div>';
                    return;
                }
                try {
                    const { data, error } = await supabase
                        .from('products')
                        .select('*')
                        .eq('id', productId);
                    if(error || !data || data.length === 0) throw new Error("Product not found");
                    const product = data[0];
                    
                    let categoryName = 'Uncategorized';
                    if (product.category_id) {
                        const { data: catData } = await supabase.from('categories').select('name').eq('id', product.category_id).single();
                        if (catData) categoryName = catData.name;
                    }
                    const stockStatus = product.stock_quantity > 0 
                        ? `<span class="in-stock"><i class="fas fa-check-circle"></i> In Stock (${product.stock_quantity} available)</span>` 
                        : '<span class="out-stock"><i class="fas fa-times-circle"></i> Out of Stock</span>';
                    
                    container.innerHTML = `
                        <div class="product-image">
                            <img src="${product.image_url || 'https://placehold.co/400x400/f5f5f5/8B3C1C?text=JOY+GINI'}" onerror="this.src='https://placehold.co/400x400/f5f5f5/8B3C1C?text=JOY+GINI'">
                        </div>
                        <div class="product-info">
                            <div class="product-category">${escapeHtml(categoryName)}</div>
                            <div class="product-title">${escapeHtml(product.name)}</div>
                            <div id="productRatingPreview" class="rating-section">
                                <div class="stars-display"><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i><i class="far fa-star"></i></div>
                                <span class="review-count-text">Loading reviews...</span>
                            </div>
                            <div class="product-price">₹${Number(product.price).toLocaleString('en-IN')}</div>
                            <div class="product-stock">${stockStatus}</div>
                            <div class="description">${escapeHtml(product.description) || 'Premium quality product from Joy Gini Manson\'s Cosmetics.'}</div>
                            <div class="action-buttons">
                                ${product.stock_quantity > 0 ? `<button class="btn btn-buy" id="orderNowBtn">Buy Now</button>` : ''}
                                <button class="btn share-btn" id="shareBtn"><i class="fab fa-whatsapp"></i> Share</button>
                            </div>
                        </div>
                    `;
                    if (product.stock_quantity > 0) document.getElementById('orderNowBtn').addEventListener('click', () => openOrderModal(product));
                    document.getElementById('shareBtn').addEventListener('click', () => {
                        const text = `Check out ${product.name} at JOY GINI MANSON'S! Price: ₹${product.price}. ${window.location.href}`;
                        if (navigator.share) navigator.share({title: product.name, text});
                        else window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
                    });
                    
                    await loadAndDisplayReviews(product.id);
                } catch(err) {
                    console.error(err);
                    container.innerHTML = '<div style="padding:60px;text-align:center;">Something went wrong.</div>';
                }
            }
            
            function openOrderModal(product) {
                if (!product || product.stock_quantity <= 0) {
                    alert('Out of stock!');
                    return;
                }
                document.getElementById('productId').value = product.id;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('quantity').max = product.stock_quantity;
                document.getElementById('quantity').value = 1;
                document.getElementById('orderModal').classList.add('active');
            }
            
            document.getElementById('modalClose').onclick = () => document.getElementById('orderModal').classList.remove('active');
            document.getElementById('reviewModalClose').onclick = () => document.getElementById('reviewModal').classList.remove('active');
            document.getElementById('submitReviewBtn').onclick = submitReview;
            
            document.getElementById('orderForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const pid = document.getElementById('productId').value;
                const price = parseFloat(document.getElementById('productPrice').value);
                const name = document.getElementById('customerName').value.trim();
                let phone = document.getElementById('customerPhone').value.trim();
                const addr = document.getElementById('customerAddress').value.trim();
                const qty = parseInt(document.getElementById('quantity').value);
                const inst = document.getElementById('specialInstructions').value.trim();
                if(!name || !phone || !addr) { alert('Please fill all required fields'); return; }
                if(!phone.startsWith('+')) phone = '+91' + phone;
                
                const { data: prod, error: stockErr } = await supabase.from('products').select('stock_quantity').eq('id', pid).single();
                if(stockErr || !prod || prod.stock_quantity < qty) { alert('Insufficient stock'); return; }
                
                let customerId = null;
                const { data: existing } = await supabase.from('customers').select('id').eq('phone', phone).maybeSingle();
                if(existing) customerId = existing.id;
                else {
                    const { data: newCust, error: ce } = await supabase.from('customers').insert([{ name, phone, address: addr }]).select().single();
                    if(ce) { alert('Customer creation failed'); return; }
                    customerId = newCust.id;
                }
                const total = price * qty;
                const orderNumber = 'ORD' + Date.now() + Math.floor(Math.random() * 1000);
                const { data: order, error: oe } = await supabase.from('orders').insert([{ 
                    order_number: orderNumber, customer_id: customerId, order_type: 'online', 
                    order_source: 'online', total_amount: total, discount_amount: 0, gst_amount: 0, 
                    paid_amount: total, due_amount: 0, payment_mode: 'pending', status: 'pending', 
                    order_date: new Date().toISOString(), delivery_address: addr, special_instructions: inst || null 
                }]).select().single();
                if(oe) { alert('Order failed: ' + oe.message); return; }
                await supabase.from('order_items').insert([{ order_id: order.id, product_id: pid, quantity: qty, price_at_time: price }]);
                await supabase.from('products').update({ stock_quantity: prod.stock_quantity - qty }).eq('id', pid);
                alert('Order placed successfully!');
                window.location.href = `order-success.html?order_id=${orderNumber}`;
                document.getElementById('orderModal').classList.remove('active');
            });
            
            loadProduct();
        })();
    </script>
</body>
</html>
