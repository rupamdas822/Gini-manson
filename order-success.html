<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Order Success | joy gini manson's name </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .success-card {
            background: white;
            max-width: 500px;
            width: 100%;
            border-radius: 32px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            animation: fadeInUp 0.5s ease;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .checkmark {
            width: 80px;
            height: 80px;
            background: #2e7d32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            animation: scaleIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        @keyframes scaleIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .checkmark i {
            font-size: 3rem;
            color: white;
        }
        h1 {
            color: #1b5e20;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }
        p {
            color: #2c1810;
            margin-bottom: 15px;
            line-height: 1.5;
        }
        .order-id {
            background: #f5f0eb;
            padding: 10px;
            border-radius: 12px;
            font-family: monospace;
            font-size: 1rem;
            margin: 15px 0;
            display: inline-block;
        }
        .redirect-note {
            margin-top: 25px;
            font-size: 0.85rem;
            color: #8B7355;
        }
        .btn {
            display: inline-block;
            background: #8B4513;
            color: white;
            padding: 12px 30px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 20px;
            transition: 0.3s;
        }
        .btn:hover {
            background: #5C2E0B;
            transform: translateY(-2px);
        }
        @media (max-width: 480px) {
            .success-card { padding: 30px 20px; }
            h1 { font-size: 1.4rem; }
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="checkmark">
            <i class="fas fa-check"></i>
        </div>
        <h1>Order Placed Successfully!</h1>
        <p>Thank you for shopping with  joy gini manson's.</p>
        <div id="orderIdDisplay" class="order-id"></div>
        <p>We have received your order and will process it soon.<br>A confirmation message has been sent to your WhatsApp number.</p>
        <div class="redirect-note">
            <i class="fas fa-sync-alt fa-spin"></i> Redirecting to home page in <span id="countdown">5</span> seconds...
        </div>
        <a href="index.html" class="btn"><i class="fas fa-home"></i> Go to Home Now</a>
    </div>

    <script>
        // Get order ID from URL query parameter
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('order_id');
        if (orderId) {
            document.getElementById('orderIdDisplay').innerHTML = `<i class="fas fa-receipt"></i> Order ID: ${orderId}`;
        } else {
            document.getElementById('orderIdDisplay').style.display = 'none';
        }

        // Countdown and redirect
        let seconds = 5;
        const countdownEl = document.getElementById('countdown');
        const interval = setInterval(() => {
            seconds--;
            countdownEl.textContent = seconds;
            if (seconds <= 0) {
                clearInterval(interval);
                window.location.href = 'index.html';
            }
        }, 1000);
    </script>
</body>
</html>
