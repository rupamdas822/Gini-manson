<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Admin Login | joy gini manson's Cosmetics</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a0f0a 0%, #2c1810 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            max-width: 450px;
            width: 100%;
            background: #fff8f0;
            border-radius: 28px;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }
        .login-header {
            background: linear-gradient(135deg, #8B4513, #5C2E0B);
            padding: 35px 30px;
            text-align: center;
            color: white;
        }
        .login-header h2 {
            font-size: 1.6rem;
            letter-spacing: 2px;
        }
        .login-header h2 small {
            font-size: 0.8rem;
            display: block;
            letter-spacing: 4px;
            margin-top: 5px;
        }
        .login-body {
            padding: 35px 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c1810;
        }
        .input-group {
            position: relative;
        }
        .input-group input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid #e8ddd0;
            border-radius: 14px;
            font-size: 1rem;
            background: white;
        }
        .input-group input:focus {
            outline: none;
            border-color: #D4AF37;
        }
        .input-group .input-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #8B7355;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8B7355;
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #8B4513, #5C2E0B);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 15px;
            transition: 0.3s;
        }
        .login-btn:hover { transform: translateY(-2px); }
        .login-btn.loading { opacity: 0.7; cursor: not-allowed; }
        .message {
            padding: 12px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            align-items: center;
            gap: 10px;
            font-size: 0.85rem;
        }
        .message.error {
            background: #fef2f0;
            color: #c62828;
            border-left: 4px solid #c62828;
            display: flex;
        }
        .message.success {
            background: #e8f5e9;
            color: #2e7d32;
            border-left: 4px solid #2e7d32;
            display: flex;
        }
        .login-footer {
            text-align: center;
            padding: 20px 30px;
            border-top: 1px solid #e8ddd0;
            font-size: 0.75rem;
            color: #8B7355;
        }
        .back-to-site {
            display: inline-block;
            margin-top: 10px;
            color: #8B4513;
            text-decoration: none;
        }
        .back-to-site:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h2>JOY GINI MANSON'S<br><small>PREMIUM COSMETICS BRAND</small></h2>
            <p><i class="fas fa-shield-alt"></i> Admin & Employee Portal</p>
        </div>
        
        <div class="login-body">
            <div id="messageBox" class="message"></div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email Address</label>
                    <div class="input-group">
                        <i class="fas fa-envelope input-icon"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-lock"></i> Password</label>
                    <div class="input-group">
                        <i class="fas fa-key input-icon"></i>
                        <input type="password" id="password" placeholder="Enter your password" required>
                        <i class="fas fa-eye-slash toggle-password" id="togglePassword"></i>
                    </div>
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    <i class="fas fa-sign-in-alt"></i> Login to Dashboard
                </button>
            </form>
        </div>
        
        <div class="login-footer">
            <p>Piyali Bazar, Baruipur, South 24 Parganas, West Bengal - 743330</p>
            <a href="index.html" class="back-to-site"><i class="fas fa-arrow-left"></i> Back to Customer Site</a>
        </div>
    </div>

    <script>
        (function() {
            const SUPABASE_URL = 'https://sbnkxplyjifishrocjge.supabase.co';
            const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNibmt4cGx5amlmaXNocm9jamdlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4MDA5OTUsImV4cCI6MjA5MjM3Njk5NX0.dVASIJbH19EIEy6oenyjwKb2sJVjQ3YPZir6iNZCKGk';
            const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            
            const emailInput = document.getElementById('email');
            const passwordInput = document.getElementById('password');
            const togglePassword = document.getElementById('togglePassword');
            const loginBtn = document.getElementById('loginBtn');
            const messageBox = document.getElementById('messageBox');
            
            // Toggle password visibility
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.classList.toggle('fa-eye');
                this.classList.toggle('fa-eye-slash');
            });
            
            function showMessage(text, type) {
                messageBox.className = 'message ' + type;
                messageBox.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : 'exclamation-circle'}"></i> ${text}`;
                messageBox.style.display = 'flex';
                if (type === 'success') {
                    setTimeout(() => { messageBox.style.display = 'none'; }, 3000);
                }
            }
            
            function clearMessage() { messageBox.style.display = 'none'; }
            
            document.getElementById('loginForm').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = emailInput.value.trim();
                const password = passwordInput.value;
                if (!email || !password) { showMessage('Please enter both email and password', 'error'); return; }
                clearMessage();
                loginBtn.classList.add('loading');
                loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Authenticating...';
                loginBtn.disabled = true;
                
                try {
                    // Query employees table
                    const { data, error } = await supabase
                        .from('employees')
                        .select('id, full_name, email, role, is_active, password')
                        .eq('email', email)
                        .maybeSingle();
                    
                    if (error || !data) {
                        showMessage('Invalid email or password', 'error');
                        loginBtn.classList.remove('loading');
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                        loginBtn.disabled = false;
                        return;
                    }
                    
                    if (!data.is_active) {
                        showMessage('Your account is deactivated. Contact administrator.', 'error');
                        loginBtn.classList.remove('loading');
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                        loginBtn.disabled = false;
                        return;
                    }
                    
                    if (data.password !== password) {
                        showMessage('Invalid email or password', 'error');
                        loginBtn.classList.remove('loading');
                        loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                        loginBtn.disabled = false;
                        return;
                    }
                    
                    // ✅ Successful login - store user info including role
                    localStorage.setItem('adminUser', JSON.stringify({
                        id: data.id,
                        email: data.email,
                        full_name: data.full_name,
                        role: data.role,          // 'admin' or 'staff'
                        isLoggedIn: true,
                        loginTime: Date.now()
                    }));
                    showMessage('Login successful! Redirecting to dashboard...', 'success');
                    setTimeout(() => { window.location.href = 'admin-dashboard.html'; }, 1000);
                    
                } catch (err) {
                    console.error(err);
                    showMessage('Network error. Please try again.', 'error');
                    loginBtn.classList.remove('loading');
                    loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Login to Dashboard';
                    loginBtn.disabled = false;
                }
            });
            
            // Redirect if already logged in
            const storedUser = localStorage.getItem('adminUser');
            if (storedUser) {
                try { const user = JSON.parse(storedUser); if (user.isLoggedIn) { window.location.href = 'admin-dashboard.html'; } } catch(e) {}
            }
            emailInput.focus();
        })();
    </script>
</body>
</html>
